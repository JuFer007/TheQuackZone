<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | The QuackZone</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styleSesion.css">
</head>
<body>
<div class="auth-container">
    <!-- LEFT SIDE - BRANDING -->
    <div class="auth-branding">
        <div class="branding-content">
            <img src="/recursos/imagen.png" alt="The QuackZone Logo" class="brand-logo-img" id="brandLogo">
        </div>
    </div>

    <!-- RIGHT SIDE - FORMS -->
    <div class="auth-forms">
        <a class="back-home" href="/">
            <i class="fas fa-arrow-left"></i>
            Volver al inicio
        </a>

        <div class="forms-container">
            <div class="forms-header">
                <h2 class="forms-title">¡Bienvenido!</h2>
                <p class="forms-subtitle">Inicia sesión o crea tu cuenta para continuar</p>
            </div>

            <!-- TABS -->
            <div class="auth-tabs">
                <button id="loginTab" class="auth-tab active" onclick="switchTab('login')">
                    Iniciar Sesión
                </button>
                <button id="registerTab" class="auth-tab" onclick="switchTab('register')">
                    Registrarse
                </button>
            </div>

            <!-- LOGIN FORM -->
            <div class="auth-form active" id="loginForm">
                <div class="error-message" id="loginError">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="loginErrorText"></span>
                </div>

                <div class="success-message" id="loginSuccess">
                    <i class="fas fa-check-circle"></i>
                    <span>¡Inicio de sesión realizado exitosamente!</span>
                </div>

                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label">Correo Electrónico</label>
                        <div class="input-group">
                            <input type="email" id="loginEmail" class="form-input" placeholder="tu@email.com" required>
                            <i class="fas fa-envelope input-icon"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Contraseña</label>
                        <div class="input-group">
                            <input type="password" class="form-input" id="loginPassword" placeholder="••••••••" required>
                            <i class="fas fa-lock input-icon"></i>
                            <button type="button" class="password-toggle" onclick="togglePassword('loginPassword')">
                                <i class="fas fa-eye" id="loginPasswordIcon"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-options">
                        <div class="checkbox-group">
                            <input type="checkbox" class="checkbox-input" id="rememberMe">
                            <label class="checkbox-label" for="rememberMe">Recordarme</label>
                        </div>
                        <a href="#" class="forgot-link" onclick="alert('Función en desarrollo')">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" class="submit-btn" id="loginBtn">
                        <i class="fas fa-sign-in-alt"></i>
                        Iniciar Sesión
                    </button>
                </form>

                <div class="divider">
                    <span>O continúa con</span>
                </div>

                <div class="social-login">
                    <button class="social-btn" onclick="socialLogin('google')">
                        <i class="fab fa-google"></i>
                        Google
                    </button>
                    <button class="social-btn" onclick="socialLogin('facebook')">
                        <i class="fab fa-facebook-f"></i>
                        Facebook
                    </button>
                </div>
            </div>

            <!-- REGISTER FORM -->
            <div class="auth-form" id="registerForm">
                <div class="error-message" id="registerError">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="registerErrorText"></span>
                </div>

                <div class="success-message" id="registerSuccess">
                    <i class="fas fa-check-circle"></i>
                    <span>¡Cuenta creada exitosamente!</span>
                </div>

                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label class="form-label">Nombre Completo</label>
                        <div class="input-group">
                            <input type="text" class="form-input" id="registerName" placeholder="Juan Pérez" required>
                            <i class="fas fa-user input-icon"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Correo Electrónico</label>
                        <div class="input-group">
                            <input type="email" class="form-input" id="registerEmail" placeholder="tu@email.com" required>
                            <i class="fas fa-envelope input-icon"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Número de Télefono</label>
                        <div class="input-group">
                            <input type="text" class="form-input" id="registerTelefono" placeholder="999 999 999" required>
                            <i class="fas fa-mobile-screen input-icon"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Contraseña</label>
                        <div class="input-group">
                            <input type="password" class="form-input" id="registerPassword" placeholder="••••••••" required minlength="6">
                            <i class="fas fa-lock input-icon"></i>
                            <button type="button" class="password-toggle" onclick="togglePassword('registerPassword')">
                                <i class="fas fa-eye" id="registerPasswordIcon"></i>
                            </button>
                        </div>
                    </div>

                    <div class="terms-group">
                        <div class="checkbox-group">
                            <input type="checkbox" class="checkbox-input" id="terms" required>
                            <label class="checkbox-label" for="terms">
                                Acepto los <a href="#">términos y condiciones</a>
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn" id="registerBtn">
                        <i class="fas fa-user-plus"></i>
                        Crear Cuenta
                    </button>
                </form>

                <div class="divider">
                    <span>O regístrate con</span>
                </div>

                <div class="social-login">
                    <button class="social-btn" onclick="socialLogin('google')">
                        <i class="fab fa-google"></i>
                        Google
                    </button>
                    <button class="social-btn" onclick="socialLogin('facebook')">
                        <i class="fab fa-facebook-f"></i>
                        Facebook
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/js/scriptAlternarSesion.js"></script>
<script src="/js/scriptLogin.js"></script>
<script src="/js/scriptRegister.js"></script>
<script src="/js/scriptUsuario.js"></script>
</body>
</html>
