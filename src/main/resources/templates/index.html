<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The QuackZone | Inicio</title>
    <script src="https://unpkg.com/ionicons@4.5.10-0/dist/ionicons.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick-theme.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <!-- Estilos -->
    <link rel="stylesheet" href="/css/styleHeader.css">
    <link rel="stylesheet" href="/css/styleIndex.css">
    <link rel="stylesheet" href="/css/styleCards.css">
    <link rel="stylesheet" href="/css/styleCarrito.css">
</head>

<!-- HEADER -->
<header>
    <div class="header-container">
        <div class="logo">
            <img src="/recursos/logoPagina.png" alt="logo" />
        </div>

        <nav id="nav-public">
        <a href="#"><i class="fa-solid fa-house"></i> Inicio</a>
        <a href="#"><i class="fa-brands fa-playstation"></i> PlayStation 5</a>
        <a href="#"><i class="fa-solid fa-desktop"></i> PC</a>
        </nav>

        <div class="right-section">
        <div id="auth-buttons">
            <button class="btn btn-login" onclick="window.location.href='/sesion'">
            <i class="fa-solid fa-user"></i> Iniciar Sesión
            </button>
        </div>

        <!-- Drowpmenu al iniciar sesion -->
        <div id="user-section" class="hidden">
            <div class="user-profile">
            <span class="user-name">Usuario</span> 
            <img
                src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=100&h=100&fit=crop"
                alt="User"
            />
            <span class="dropdown-icon"></span>
            <div class="dropdown-menu">
                <a id="profileLink">
                    <i class="fa-solid fa-id-badge"></i> Mi Perfil
                </a>
                <a href="#" id="cartLinkDropdown">
                    <i class="fa-solid fa-cart-shopping"></i> Carrito de compras
                </a>
                <a href="#">
                    <i class="fa-solid fa-heart"></i> Lista de Deseos
                </a>
                <div class="dropdown-divider"></div>
                <a href="#" id="logout-link"><i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión</a>
            </div>
            </div>
        </div>
        </div>
    </div>
</header>

<!-- OVERLAY DEL CARRITO -->
<div class="cart-overlay" id="cartOverlay"></div>

<!-- SIDEBAR DEL CARRITO -->
<div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
        <h2 class="carrito-title">
            <i class="fa-solid fa-shopping-cart"></i>
            Carrito de Compras
        </h2>
        <button class="close-cart" id="closeCart">
            <i class="fa-solid fa-times"></i>
        </button>
    </div>

    <div class="cart-items" id="cartItems">
        <!-- Los items se cargarán aquí dinámicamente -->
    </div>

    <div class="cart-footer" id="cartFooter" style="display: none;">
        <div class="cart-subtotal">
            <span>Subtotal:</span>
            <span id="cartSubtotal">S/. 0.00</span>
        </div>
        <div class="cart-total" style="color: white !important;">
            <span>Total:</span>
            <span class="cart-total-amount" id="cartTotal">S/. 0.00</span>
        </div>
        <button class="checkout-btn" onclick="procederAlCheckout()">
            <i class="fa-solid fa-credit-card"></i>
            Proceder al Pago
        </button>
        <button class="clear-cart-btn" onclick="vaciarCarrito()">
            <i class="fa-solid fa-trash"></i>
            Vaciar Carrito
        </button>
    </div>
</div>

<body>
<div class="wrapper">
    <main>
        <div class="toast-container" id="toast"></div>
        <section id="home">
            <br>
            <h2>Juegos Populares</h2>
            <div class="carrusel"></div>
        </section>

        <!-- SECCION DE CATEGORÍAS -->
        <section class="categories-section">
            <h2 class="titulo-section">Explora por Categorías</h2>
            
            <div class="category-filters">
                <button class="category-btn active" data-category="todos">
                    <i class="fas fa-th"></i> Todos
                </button>
                <button class="category-btn" data-category="Accion">
                    <i class="fas fa-bomb"></i> Acción
                </button>
                <button class="category-btn" data-category="Deportes">
                    <i class="fas fa-futbol"></i> Deportes
                </button>
                <button class="category-btn" data-category="Mundo Abierto">
                    <i class="fas fa-globe"></i> Mundo Abierto
                </button>
                <button class="category-btn" data-category="Shooter">
                    <i class="fas fa-crosshairs"></i> Shooter
                </button>
                <button class="category-btn" data-category="Supervivencia">
                    <i class="fas fa-hiking"></i> Supervivencia
                </button>
                <button class="category-btn" data-category="Terror">
                    <i class="fas fa-ghost"></i> Terror
                </button>
            </div>

            <div class="games-grid" id="gamesGrid"></div>
        </section>
    </main>
</div>

<!-- MODAL DE INFORMACIÓN -->
<div id="gameModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <img id="modalImage" src="" alt="Game Image">
      <span class="close-modal">&times;</span>
    </div>
    <div class="modal-body">
      <h2 class="modal-title" id="modalTitle"></h2>
      <p class="modal-description" id="modalDescription"></p>
      <div class="modal-details">
        <div class="modal-detail-item">
          <i class="fas fa-calendar"></i>
          <div>
            <div class="modal-detail-label">Fecha de lanzamiento</div>
            <div class="modal-detail-value" id="modalReleaseDate"></div>
          </div>
        </div>
        <div class="modal-detail-item">
          <i class="fa-solid fa-layer-group"></i>
          <div>
            <div class="modal-detail-label">Categoria</div>
            <div class="modal-detail-value" id="modalCategoria"></div>
          </div>
        </div>
        <div class="modal-detail-item">
          <i class="fas fa-gamepad"></i>
          <div>
            <div class="modal-detail-label">Plataforma</div>
            <div class="modal-detail-value" id="modalPlatform"></div>
          </div>
        </div>
        <div class="modal-detail-item">
          <i class="fas fa-star"></i>
          <div>
            <div class="modal-detail-label">Rating</div>
            <div class="modal-detail-value" id="modalRating"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <div class="modal-price" id="modalPrice"></div>
      <button class="modal-buy-btn" onclick="agregarAlCarrito(currentGame)">
        <i class="fas fa-shopping-cart"></i>
        Agregar al Carrito
      </button>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script src="/js/scriptCargarJuegos.js"></script>
<script src="/js/scriptCargarPopulares.js"></script>
<script src="/js/scriptDrowpMenu.js"></script>
<script src="/js/scriptCarrito.js"></script>
</body>
</html>
